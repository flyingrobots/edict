[release_tags]
mutation = "forbidden"
recovery = "publish_existing_valid_tag"
requires_main_reachable_target = true
normal_creation = "auto_after_release_pr_main_ci"
manual_creation = "operator_fallback"

[release_automation]
trigger = "successful_main_ci_after_release_prep_merge"
source_event = "push"
source_branch_pattern = "release/vX.Y.Z-alpha.N-prep"
tag_derivation = "strip_release_prefix_and_prep_suffix"
publication_trigger = "workflow_dispatch"
manual_recovery_trigger = "workflow_dispatch"
manual_recovery_requires = [
  "main_ci_success",
  "merged_release_pr",
  "manual_tag_matches_release_prep_pr",
]
close_milestone = "after_github_release_when_zero_open_issues"
milestone_lookup = "paginated_all_states"
milestone_selection = "complete_stream_first_match"
job_permissions = "least_privilege"
publication_before_milestone_closure = true
idempotency = "existing_same_target_tag_ok"
existing_different_target_tag = "fail_without_mutation"
required_checks = [
  "merged_release_pr",
  "release_notes_file",
  "tag_absent_or_same_target",
  "main_ci_success",
  "main_reachable_manual_sha",
  "manual_tag_matches_release_prep_pr",
  "zero_open_milestone_issues",
]

[release_runbook]
manual_fallback_target = "verified_main_merge_commit"
post_release_milestone_lookup = "all_states_paginated"
steps = [
  "prepare_branch",
  "write_release_thesis",
  "diff_previous_tag",
  "reconcile_signpost_docs",
  "audit_topic_shelves",
  "verify_local",
  "open_pull_request",
  "merge_gate",
  "auto_tag_publish",
  "watch_workflow",
  "capture_evidence",
  "capture_release_report",
  "recover_without_tag_mutation",
]
required_checks = [
  "cargo test -p xtask release_",
  "cargo xtask verify",
  "git diff --stat <previous-tag>..HEAD",
  "git diff --name-status <previous-tag>..HEAD",
  "git log --oneline <previous-tag>..HEAD",
  "docs_topics_audit_coverage_floor",
  "docs_topics_audit_accuracy_floor",
  "gh pr checks",
  "gh release view",
]
required_evidence = [
  "release_thesis",
  "release_issue",
  "release_prep_pull_request",
  "previous_tag_diff_stat",
  "previous_tag_diff_name_status",
  "previous_tag_log",
  "docs_topics_coverage_percent",
  "docs_topics_accuracy_percent",
  "docs_topics_audit_findings",
  "milestone_zero_open_at_tag_time",
  "main_ci_run",
  "auto_release_tag_run",
  "tag_object",
  "github_release_url",
  "no_crates_io_publication",
  "release_report",
  "plan_versus_actual",
  "fallout_issues",
  "next_release_thesis",
]

[release_thesis]
required = true
location = "release_issue_and_pr_body"
v0_7_0_alpha_1 = "file_backed_authority_facts"
v0_8_0_alpha_1 = "minimal_effectful_compiler_spine"
v0_9_0_alpha_1 = "first_target_ir_alpha"

[release_diff_reconciliation]
previous_tag_diff_required = true
commands = [
  "git diff --stat <previous-tag>..HEAD",
  "git diff --name-status <previous-tag>..HEAD",
  "git log --oneline <previous-tag>..HEAD",
]
purpose = "justify_release_notes_changelog_roadmap_and_docs_impact"

[release_report]
required = true
location = "release_issue_or_docs_releases_note"
sections = [
  "released",
  "not_released",
  "plan_versus_actual",
  "evidence",
  "fallout_issues",
  "next_release_thesis",
]
must_record_no_crates_io_publication = true

[release_topic_audit]
scope = "docs/topics"
timing = "release_prep_before_pr"
evidence_location = "release_issue_or_pr_before_merge"
release_blocking = true
coverage_floor_percent = 90
accuracy_floor_percent = 90
coverage_definition = "audited_topic_shelves / total_topic_shelves"
accuracy_definition = "accurate_audited_topic_shelves / audited_topic_shelves"
stale_current_truth = "correct_or_remove_before_counting_accurate"
required_evidence = [
  "topic_shelf_total",
  "topic_shelf_audited",
  "accurate_audited_topic_shelves",
  "coverage_percent",
  "accuracy_percent",
  "findings_fixed_or_release_blocking",
]

