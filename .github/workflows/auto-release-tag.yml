name: Auto Release Tag

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: auto-release-tag-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  tag-release:
    name: tag merged release PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Identify merged release PR
        id: release_pr
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          PRS_JSON="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/commits/${SHA}/pulls")"

          MATCHES="$(jq '[.[] | select(
            .merged_at != null and
            .base.ref == "main" and
            (.head.ref | test("^release/v[0-9]+\\.[0-9]+\\.[0-9]+-alpha\\.[0-9]+-prep$"))
          )]' <<<"${PRS_JSON}")"
          COUNT="$(jq 'length' <<<"${MATCHES}")"

          if [[ "${COUNT}" == "0" ]]; then
            echo "::notice::Successful main CI did not come from a release-prep PR."
            echo "release=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${COUNT}" != "1" ]]; then
            echo "::error::Expected exactly one release-prep PR for ${SHA}; found ${COUNT}."
            exit 1
          fi

          HEAD_REF="$(jq -r '.[0].head.ref' <<<"${MATCHES}")"
          PR_NUMBER="$(jq -r '.[0].number' <<<"${MATCHES}")"
          RELEASE_BRANCH_REGEX='^release/(v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+)-prep$'

          if [[ ! "${HEAD_REF}" =~ ${RELEASE_BRANCH_REGEX} ]]; then
            echo "::error::Release branch did not match expected pattern: ${HEAD_REF}"
            exit 1
          fi

          TAG="${BASH_REMATCH[1]}"
          NOTES="docs/releases/${TAG}.md"

          if [[ ! -f "${NOTES}" ]]; then
            echo "::error::Missing release notes file: ${NOTES}"
            exit 1
          fi

          {
            echo "release=true"
            echo "tag=${TAG}"
            echo "pr=${PR_NUMBER}"
            echo "sha=${SHA}"
          } >>"${GITHUB_OUTPUT}"

      - name: Create immutable release tag
        if: steps.release_pr.outputs.release == 'true'
        id: tag
        env:
          TAG: ${{ steps.release_pr.outputs.tag }}
          SHA: ${{ steps.release_pr.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
            TAG_COMMIT="$(git rev-parse "${TAG}^{commit}")"

            if [[ "${TAG_COMMIT}" != "${SHA}" ]]; then
              echo "::error::Tag ${TAG} already targets ${TAG_COMMIT}; refusing to move it to ${SHA}."
              exit 1
            fi

            echo "::notice::Tag ${TAG} already targets ${SHA}."
            echo "created=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          git tag -a "${TAG}" "${SHA}" -m "${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "created=true" >>"${GITHUB_OUTPUT}"

      - name: Dispatch release publication
        if: steps.release_pr.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_pr.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run release.yml --ref main -f tag="${TAG}"
