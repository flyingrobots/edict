name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust ${{ matrix.rust-label }} (fmt · clippy · test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust-version: "1.85.0"
            rust-label: "msrv 1.85.0"
          - rust-version: stable
            rust-label: "stable"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install Rust
        run: |
          rustup toolchain install "${{ matrix.rust-version }}" \
            --profile minimal \
            --component rustfmt \
            --component clippy
      - name: Format
        run: cargo +"${{ matrix.rust-version }}" fmt --all --check
      - name: Clippy (warnings as errors)
        run: cargo +"${{ matrix.rust-version }}" clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo +"${{ matrix.rust-version }}" test --workspace --all-features
